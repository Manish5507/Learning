<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="paper.css">
</head>
<body class="body-body">
        <div class="headings">
            <h1>Rock Paper Scissors </h1>
        </div>
        
        <div class="but">
            <button onclick="playGame('rock');" class="click-me" >
         <img src="../rock-paper-scissors/images/rock.jpeg">
    </button>

    <button onclick="playGame('paper');" class="click-me" >
        <img src="../rock-paper-scissors/images/paper.jpeg">
    </button>

    <button onclick="playGame('scissors');" class="click-me" >
        <img src="../rock-paper-scissors/images/seaser.jpeg">
    </button>
        </div>

        <div>
        <p class="js-result result"></p>
        <p class="js-moves"></p>
        <p class="js-score score"></p>
        </div>

        <div>
            <button onclick="
            score.wins = 0;
            score.losses = 0;
            score.ties = 0;
            localStorage.removeItem('score');
            updateScoreElement();
            " class="reset-score-button">Reset Score</button>
        </div>
    

    <script src="scissor.js"></script>
</body>
</html>
